name: 'Multi-Agent Review'
description: 'Claude Code reviews for AI-authored PRs'
inputs:
  anthropic_api_key:
    description: 'Anthropic API key'
    required: true
  model:
    description: 'Claude model to use'
    default: 'claude-sonnet-4-6'
  max_diff_lines:
    description: 'Maximum diff lines before truncation'
    default: '5000'
outputs:
  verdict:
    description: 'Review verdict (clean, minor_issues, major_issues, critical)'
  findings_count:
    description: 'Number of findings'
runs:
  using: 'node20'
  main: 'action/dist/index.js'
